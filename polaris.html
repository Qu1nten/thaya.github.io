    <div class="text-container">
        <h1 data-english="POLARIS" data-dutch="POLARIS">POLARIS</h1>

        <div class="language-toggle">
            <button id="englishBtn">ENGLISH</button>
            <button id="dutchBtn">DUTCH</button>
        </div>

        <p
        data-english="Polaris is a lookout tower in the Soesterduinen.
        The shape of the structure represents a north arrow. The main lines of the design rise diagonally into the sky, referencing the North Star.
        At the highest point of the structure is a flat platform where you can stand. The structure consists of two elements that mirror each other. The two elements deliberately do not touch. I chose this in order to create a split within connection. When you stand at the highest point of the structure, you can hold a conversation with someone on the mirrored section. Yet there is a break in the connection, because there is no passage between them.

        'Though we are not in contact, the connection is stronger than before.'" 
        
        data-dutch="Polaris is een uitkijktoren in de Soesterduinen.
        De vorm van de constructie representeert een noordpijl. De hoofdlijnen in het ontwerp lopen schuin de lucht in, dit verwijst naar de poolster.
        Op het hoogste punt van de constructie is een vlak stuk waar je kan staan. De constructie bestaat uit twee elementen, die weerspiegeld zijn. De twee elementen raken elkaar bewust niet aan. Ik heb hiervoor gekozen om een splitsing in verbinding te creëren. Als je op het hoogste punt van de constructie staat, kan je een conversatie houden met iemand op het gespiegelde gedeelte. Toch is er een breuk in de connectie doordat er geen doorgang is.

        'Al zijn wij niet in contact, is de verbinding sterker dan tevoren.'">
        </p>
