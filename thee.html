    <div class="text-container">
        <h1 data-english="SHALL WE HAVE SOME TEA?" data-dutch="ZULLEN WE EVEN THEE DRINKEN?">ZULLEN WE EVEN THEE DRINKEN?</h1>

        <div class="language-toggle">
            <button id="englishBtn">ENGLISH</button>
            <button id="dutchBtn">DUTCH</button>
        </div>

        <p
        data-english="For the exhibition 'Exposure', I designed a greenhouse together with Thaya Callisaya Hilara as a place for rest, encounter and slowing down. The design is inspired by Japanese tea culture, traditional wooden construction and the social atmosphere of an izakaya (a traditional Japanese restaurant), where being together and attention to the moment are central.

        With 'Shall we have some tea?', the experiences from the workshop in Japan are shared. The focus on encounter, rest, craftsmanship and mindful engagement with one's surroundings is translated into a place where visitors can slow down. Inside the greenhouse, a video of the workshop experience plays. While you watch, you can enjoy a cup of tea.

        The aim is to make our experience in Japan tangible and to invite visitors to pause for a moment in a world that is constantly in motion.
        " 
        
        data-dutch="Voor de expositie 'Exposure' heb ik samen met Thaya Callisaya Hilara een kas ontworpen als plek voor rust, ontmoeting en vertraging. Het ontwerp is geïnspireerd op de Japanse theecultuur, traditionele houtbouw en de sociale sfeer van een izakaya (een traditioneel Japans restaurant), waar samenzijn en aandacht voor het moment centraal staan.

        Met “Zullen we even thee drinken?” worden de ervaringen uit de workshop in Japan gedeeld. De aandacht voor ontmoeting, rust, ambacht en bewust omgaan met de omgeving wordt vertaald naar een plek waar bezoekers kunnen vertragen. In de kas speelt een video van de ervaring van de workshop. Terwijl je kijkt, kan je genieten van een kop thee. 

        Het doel is om onze ervaring uit Japan tastbaar te maken en bezoekers uitnodigen om even stil te staan in een wereld die voortdurend in beweging is.
        ">
        </p>
    </div>

    <div class="text-container">
        <p
        data-english="While designing the greenhouse, we faced a number of design challenges. The structure had to be fully demountable, so that it could easily be transported from school to the exhibition. At the same time, the construction needed to be sturdy enough to carry the weight of both the users and the furniture. We approached this by looking at Japanese wood joinery. The individual elements of the greenhouse slot into one another and are held in place. The façades and roof of the greenhouse are made from second-hand corrugated sheets; these are milky-translucent, keeping the interior light while still providing a pleasant sense of privacy.

        The entrance of the greenhouse is inspired by the various izakayas we visited in Japan. These are traditional Japanese restaurants. A characteristic feature of these places is the 'noren', a traditional Japanese fabric divider hung in doorways or in front of windows. The structure consists of spruce beams that extend further than necessary in several places. This was a deliberate choice, based on important architectural elements such as 'chigi' and 'katsuogi', which appear in Shinto structures like the Geku and Naiku shrines in Ise, the two important shrines we saw and studied during our visit.
        " 
        
        data-dutch="Bij het ontwerpen van de kas stonden we voor een aantal ontwerp uitdagingen. Zo moest de structuur volledig demontabel zijn, zodat deze eenvoudig van school naar de expositie kon worden vervoerd. Tegelijkertijd moet de constructie stevig genoeg zijn om het gewicht van zowel de gebruikers als de meubels te dragen. We hebben dit aangepakt door te kijken naar Japanse houtverbindingen. De losse elementen van de kas worden in elkaar geschoven en op hun plek gehouden. De gevels en het dak van de kas hebben we met tweedehands golfplaten gevormd; de golfplaten zijn melk-transparant, waardoor het interieur licht blijft, maar er wel een fijne privacy aanwezig is.

        De ingang van de kas is geïnspireerd door de diverse izakaya's die we in Japan hebben bezocht. Dit zijn traditionele Japanse restaurants. Een kenmerkend onderdeel van deze plekken is de 'noren', een traditionele Japanse stofafscheiding die in deuropeningen of voor ramen wordt gehangen. De constructie bestaat uit vurenhouten balken die op meerdere delen verder doorlopen dan nodig. Dit was een bewuste keuze, gebaseerd op belangrijke architectonische elementen als 'chigi' en 'katsuogi', die voorkomen in shinto-structuren zoals de Geku- en Naiku-schrijn in Ise, de twee belangrijke schrijnen die we tijdens ons bezoek hebben gezien en bestudeerd.
        ">
        </p>
    </div>

     <div class="text-container">
        <p
        data-english="It was a huge challenge to develop the design at this scale. First, Thaya and I worked out the design as a 3D model in SketchUp and built it as a scale model. The model gave us good insight into the assembly of the structure and the weak points we still needed to address. By repeating this process, we could start on the structure with confidence. We ordered a pallet of timber and had it delivered to school by truck. In the wood workshop, I cut the timber to size and together we assembled the elements. During the building process we encountered many complications: wood that warps, weight playing a role in transport and assembly, and figuring out the best way to work the timber.
        In the end, we partially assembled the greenhouse in the canteen to test the construction.

        The step from a digital model to a physical 1:1 structure was incredibly educational. Where everything is perfectly straight in the digital world, we now had to learn to deal with unpredictable material, such as warping wood. This forced us to be flexible and solve problems on the spot. It has significantly boosted my confidence as a designer; it was hugely instructive to actually build something at this scale.
" 
        
        data-dutch="Het was een enorme uitdaging om het ontwerp op deze schaal uit te werken. Eerst hebben Thaya en ik het ontwerp als 3D-model in SketchUp uitgewerkt en dit als maquette opgebouwd. De maquette gaf ons een goed inzicht in de opbouw van de structuur en de zwakke punten die we nog moesten aanpakken. Door dit proces te herhalen konden we zelfverzekerd beginnen aan de structuur. We hebben een pallet aan hout besteld dat we met een vrachtwagen op school hebben laten afleveren. In de houtwerkplaats heb ik het hout op maat gezaagd en hebben wij samen de elementen in elkaar gezet. Tijdens het bouwproces kwamen we veel complicaties tegen: hout dat krom loopt, gewicht dat een rol speelt in het vervoer en de opbouw, en op welke manier we het hout het beste konden bewerken.

        Uiteindelijk hebben we de kas gedeeltelijk in de kantine opgebouwd om de constructie te testen.
        De stap van een digitaal model naar een fysiek 1:1-bouwwerk was enorm leerzaam. Waar digitaal alles perfect recht is, moesten we nu leren omgaan met onvoorspelbaar materiaal, zoals kromtrekkend hout. Dit dwong ons om flexibel te zijn en ter plekke problemen op te lossen. Het heeft mijn zelfvertrouwen als ontwerper flink vergroot; het was enorm leerzaam om iets echt te bouwen op deze schaal.
        ">
        </p>
