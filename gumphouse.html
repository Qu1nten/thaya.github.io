    <div class="text-container">
        <h1 data-english="THE GUMP HOUSE" data-dutch="HET GUMP HOUSE">THE GUMP HOUSE</h1>

        <div class="language-toggle">
            <button id="englishBtn">ENGLISH</button>
            <button id="dutchBtn">DUTCH</button>
        </div>

        <p
        data-english="Inspired by his likeness and lifestory, I designed a home for the movie character Forrest Gump and his Son. 

        The design reflects his simplicity, openness, and unconditional love, featuring a clear layout, accessible pathways, and a warm, natural material palette. Located on the Maaskade at Noordereiland, the house provides a safe and comforting space for Forrest and his son while also encouraging interaction with the surroundings. Subtle details, such as a perforated metal façade referencing his military past and a large oak tree in the garden as a tribute to Jenny, make this home a place of connection, memory, and belonging.
        " 
        
        data-dutch="geïnspireerd door zijn karakter en levensverhaal, heb ik een huis ontworpen voor het filmpersonage Forrest Gump en zijn zoontje,

        Het ontwerp weerspiegelt zijn eenvoud, openheid en onvoorwaardelijke liefde, met een heldere plattegrond, toegankelijke routes en een warme, natuurlijke materiaalkeuze. Gelegen aan de Maaskade op het Noordereiland, biedt het huis niet alleen een veilige en geborgen plek voor Forrest en zijn zoon, maar ook ruimte voor interactie met de omgeving. Met subtiele details, zoals een metalen kap als knipoog naar zijn militaire verleden en een grote eikenboom in de tuin als herinnering aan Jenny, vertelt het huis een verhaal van verbinding, herinnering en thuiskomen. 
        ">
        </p>
