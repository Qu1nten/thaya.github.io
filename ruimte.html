    <div class="text-container">
        <h1 data-english="SPACE FOR RECOVERY" data-dutch="RUIMTE VOOR HERSTEL">RUIMTE VOOR HERSTEL</h1>

        <div class="language-toggle">
            <button id="englishBtn">ENGLISH</button>
            <button id="dutchBtn">DUTCH</button>
        </div>

        <p
        data-english="I have a tendency to stay constantly busy and set the bar high for myself. This often leads to stress and mental overload. When mentally exhausted, I quickly fall into patterns where self-care is neglected. I sleep and eat poorly and seek out distractions, such as social media, that ultimately fail to provide any real satisfaction. The challenge for this project stemmed from the realization that I was placing an unnecessary burden on myself and needed to break free from this vicious cycle.

        Based on this personal reflection, I explored ways to consciously reconnect with ourselves and our surroundings. This insight forms the foundation of the project: the design of a 'space for recovery.' I focused on creating an environment that uses sensory elements to offer an experience, subconsciously encouraging a sense of calm. For instance, I designed a walkway above the pavilion that allows users to choose their own path, and I utilized materials such as rammed earth and locally sourced wood in colors that complement the surrounding landscape.

        The final result is a large-scale landscape pavilion in the Soesterduinen area. It serves as an accessible space for reflection, a refuge from overstimulation, and a place to mentally recharge. I presented the project through a video that conveys the experience, alongside a large-scale model illustrating the site's context." 
        
        data-dutch="Ik heb de neiging om altijd bezig te zijn en de lat hoog te leggen. Dit resulteert vaak in stress en mentale overbelasting. Op momenten van mentale vermoeidheid verval ik snel in patronen waarbij zelfzorg verdwijnt. Ik slaap en eet slecht, ik zoek naar afleidingen, zoals social media, die mij uiteindelijk geen voldoening geven. De uitdaging voor dit project begon bij de realisatie dat ik mezelf onnodig zwaar belast en de behoefte heb om uit deze vicieuze cirkel te stappen.

        Vanuit deze persoonlijke reflectie heb ik onderzocht hoe we weer bewust kunnen stilstaan bij onszelf en onze omgeving. Dit inzicht vormt de basis voor het project: het ontwerpen van een 'ruimte voor herstel'. Ik heb me gericht op het creëren van een omgeving die door middel van zintuigen een ervaring biedt die je onbewust stimuleert om tot rust te komen. Zo heb ik een wandelbrug boven het paviljoen ontworpen waar de gebruiker zijn eigen richting kan kiezen, materialen als stampleem en regionaal hout gebruikt die een complimenterende kleur heeft met de omgeving.

        Het eindresultaat is een grootschalig landschap paviljoen in de Soesterduinen. Het is een toegankelijke ruimte om te reflecteren, prikkels te ontvluchten en mentaal weer op te laden. Ik heb dit project geëxposeerd door middel van een video waarin de ervaring wordt weergegeven. En een grootschalige maquette die de context van de locatie laat zien.">
        </p>

    <div class="text-container">
        <p
        data-english="To pragmatically visualise the lines and routes I used in my sketches, I took a section of the dune landscape as an example. Not only here, but everywhere in the dunes, you can clearly find walking paths used by both people and animals in this area. The routes cross and intersect one another, forming organic 'blobs'. Later, I used these shapes and lines in my design to establish its contour.

        In this way, the design becomes part of the place, and I incorporate the context of the site into its form." 
        
        data-dutch="Om de lijnen en routes die ik in mijn schetsen heb gebruikt pragmatisch te visualiseren, heb ik een gedeelte van het duinlandschap als voorbeeld genomen. Niet alleen hier, maar overal in de duinen zijn duidelijk wandelroutes terug te vinden die door mensen en dieren in dit gebied worden gebruikt. De routes lopen dwars door elkaar heen en vormen organische 'bollen'. Later heb ik deze vormen en lijnen in mijn ontwerp gebruikt om de contour te realiseren.

        Hierdoor is het ontwerp deel van de plek en neem ik de context ervan mee in zijn vormgeving.">
        </p>
    </div>

     <div class="text-container">
        <p
        data-english="As the project location, I chose a former military complex at the foot of the Soesterduinen. Built in 1939, the site served for many years as military quarters and a workshop for both the German occupying forces and the Dutch armed forces. Although the buildings were demolished years ago, the past remains tangible: bare patches in the forest floor mark the old foundations, and many overgrown bunkers can still be found around the site, hidden in the sand.
        This place holds personal value for me. From a young age, I have come to the Soesterduinen for rest and recovery. With my design, I want to give this remote site a new purpose, with respect for its existing history." 
        
        data-dutch="Als projectlocatie heb ik gekozen voor een voormalig militair complex aan de voet van de Soesterduinen. Gebouwd in 1939, diende het terrein jarenlang als militair onderkomen en werkplaats voor zowel de Duitse bezetter als de Nederlandse krijgsmacht. Hoewel de gebouwen jaren geleden zijn gesloopt, blijft het verleden tastbaar: kale plekken in de bosgrond markeren de oude fundamenten en rondom de plek zijn nog veel overgroeide bunkers te vinden, verscholen in het zand.

        Deze plek heeft voor mij een persoonlijke waarde. Al van jongs af aan kwam ik naar de Soesterduinen voor rust en herstel. Met mijn ontwerp wil ik dit afgelegen terrein een nieuwe functie geven, met respect voor de aanwezige historie.">
        </p>
