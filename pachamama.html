        <h1 data-english="PACHAMAMA" data-dutch="PACHAMAMA">PACHAMAMA</h1>

        <div class="language-toggle">
            <button id="englishBtn">ENGLISH</button>
            <button id="dutchBtn">DUTCH</button>
        </div>

        <p
        data-english="My father is from Bolivia, from a mountainous region where the Aymara people have lived for generations. As a child, he grew up within this community, and the traditions and values of the Aymara have therefore become an important part of my own personal background. This graduation project is a way for me to explore that connection to my heritage and translate it into my design practice.

        This design project translates the Aymara value of gratitude towards Pachamama (Mother Earth) into a tangible spatial experience. Inspired by Bolivian textile patterns and cultural traditions, the project creates an ecological gathering place in Noorderpark, Amsterdam, where landscape, form, and planting come together. By combining native vegetation with an architectural pergola and the principle of reciprocity, the design invites visitors to consciously experience, appreciate, and collectively celebrate their relationship with nature."

        data-dutch="Mijn vader komt uit Bolivia, uit een bergachtig gebied waar de Aymara-bevolking leeft. Als kind groeide hij op binnen deze gemeenschap, en de tradities en waarden van de Aymara zijn daardoor een belangrijk onderdeel van mijn persoonlijke achtergrond. Dit afstudeerproject is een manier om die verbinding met mijn oorsprong te onderzoeken en te vertalen naar mijn werk. 

        Dit ontwerpproject vertaalt de Aymara-waarde van dankbaarheid aan Pachamama (Moeder Aarde) naar een tastbare, ruimtelijke ervaring. Geïnspireerd door Boliviaanse textielpatronen en culturele tradities ontstaat in het Amsterdamse Noorderpark een ecologische ontmoetingsplek waar landschap, vorm en beplanting samenkomen. Door inheemse planten en een architecturale pergola te verbinden met het principe van wederkerigheid, nodigt het ontwerp bezoekers uit om hun relatie met de natuur bewust te voelen, te waarderen en gezamenlijk te beleven.">
        </p>
