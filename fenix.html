        <h1 data-english="ISE FENIX PROJECT" data-dutch="ISE FENIX PROJECT">ISE FENIX PROJECT</h1>

        <div class="language-toggle">
            <button id="englishBtn">ENGLISH</button>
            <button id="dutchBtn">DUTCH</button>
        </div>

        <p
        data-english="I traveled to Japan to take part in the Ise Fenix Project workshop (vol. 2). During this workshop, we collaborated in four groups with students from Japan, the Dominican Republic, the Czech Republic, and the Netherlands.

        Although the Naiku and Geku shrines attract many tourists, the central districts of Ise; Kawasaki, Ujiyamada, Geku, and Furuichi, receive less attention. Through small-scale urban interventions based on the Urban Acupuncture method, the goal is to transform these neglected areas into vibrant, human-centered spaces.

        Collaborating with the local population of Ise was a remarkable experience that profoundly changed my perspective on social design issues. Previously, I had not realized that involving local residents could have such a significant impact on the design process. Going out onto the streets of Ise and creating a connection with the end-user, involving neighborhood residents and entrepreneurs proved to be as valuable as the design itself. This made me realize that as a spatial designer, I do not merely shape spaces, but I can also connect people with one another. I had the privilege of learning a great deal from my fellow students from Japan, and I was able to contribute my own design skills in my own way, with respect for Japanese culture.
        " 
        
        data-dutch="Ik ben naar Japan gereisd om mee te doen aan de Ise Fenix Project workshop (vol.2). In deze workshop hebben wij in 4 groepen samengewerkt met studenten uit Japan, Dominicaanse Republiek, Tsjechië en Nederland.

        Hoewel de schrijnen van Naiku en Geku veel toeristen trekken, krijgen de centrale wijken van Ise; Kawasaki, Ujiyamada, Geku en Furuichi minder aandacht. Door middel van kleinschalige stedelijke interventies, gebaseerd op de Urban Acupuncture-methode. Met als doel om deze verwaarloosde gebieden te transformeren tot levendige, mensgerichte plekken.

        Samenwerken met de lokale bevolking van Ise was een bijzondere ervaring die mijn perspectief op maatschappelijke ontwerpvraagstukken enorm heeft veranderd. Voorheen had ik niet gedacht dat het betrekken van lokale bewoners zo veel impact kan hebben in het ontwerpproces. In Ise de straat op gaan en een verbinding te creëren met de eindgebruiker, het betrekken van de buurtbewoners en ondernemers bleek minstens zo waardevol als het ontwerp zelf. Dit heeft me laten inzien dat ik als ruimtelijk ontwerper niet alleen vormgeef, maar ook mensen met elkaar kan verbinden. Ik heb veel mogen leren van medestudenten uit Japan, en kon op mijn eigen manier, met respect voor de Japanse cultuur, mijn ontwerperschap inbrengen.
        ">
        </p>

<div class="text-container">
        <p
        data-english=" The Ise Fenix Project is connected to the unique Japanese tradition of Shikinen Sengu. 
        This involves the rebuilding of the Geku Shrine every 20 years, a practice that has continued since 690 AD. It is an inspiring example of sustainable practices. As the shrines undergo their 63rd reconstruction (which will be completed in 2033), the Fenix Project is collaborating with the local community to reshape the city based on its cultural context." 
        
        data-dutch=" Ise Fenix Project is verbonden met de unieke Japanse traditie van Shikinen Sengu. 
        Dit gaat over de, elke 20 jaar sinds 690 n.Chr., herbouw van de Geku Shrine. Het is een inspirerend voorbeeld van duurzame praktijken. Nu de schrijnen hun 63e herbouw ondergaan (die in 2033 voltooid zal zijn), werkt het Fenix Project samen met de lokale gemeenschap om de stad opnieuw vorm te geven aan de hand van de culturele context. ">
        </p>
